[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app.
# No PowerShell — we don't support native Windows (Unix sockets + PTY
# ioctl are core to the design). Windows users can still install the
# linux-gnu binary via WSL.
installers = ["shell", "homebrew"]
# Target platforms (Rust target-triple syntax). Unix-only by design —
# the daemon uses Unix sockets, the runner uses libc::ioctl/termios for
# raw mode and PTY size detection. Adding Windows would require named
# pipes + ConPTY and a separate raw-mode implementation; not in scope.
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Path that installers should place binaries in.
# ~/.local/bin works for non-Rust users (XDG-friendly, on PATH in most
# shells). Rust users with ~/.cargo/bin in PATH still benefit; this is
# additive, not a conflict.
install-path = ["$XDG_BIN_HOME/", "$HOME/.local/bin/"]
# Whether to install an updater program
install-updater = false
